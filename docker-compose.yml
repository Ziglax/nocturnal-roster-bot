services:
  discord-bot:
    build: .
    container_name: discord-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      # Source code, configs, log.txt — live from the host. Code changes only need a restart.
      - ./:/app
      # Anonymous volume preserves the image's node_modules instead of letting the host
      # bind-mount mask it (host doesn't necessarily have node_modules, and even if it did,
      # native deps may differ between host OS and Alpine).
      - /app/node_modules
    ports:
      - "3000:3000"
